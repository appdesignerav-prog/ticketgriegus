<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket POS</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #fff;
            display: flex;
            justify-content: center;
        }

        .POS {
            width: 100%;
            width: 340px;
            background: #fff;
            overflow: hidden;
            padding: 5px;
        }
        .qr {
            width: 80px;
            margin: 15px auto;
        }
        .logo {
            margin: 15px auto;
            display: block;
            max-width: 60px;
        }
        .logo img {
            width: 100%;
            height: auto;
            margin: auto;
        }
        .header {
            background: #fff;
            color: #000;
            display: flex;
            flex-direction: row;
            gap: 0.2rem;
            align-items: center;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
        }

        .info_empresa {
            gap: 0;
            font-size: 12px;    
         }
        .info_empresa h2 {
            margin: 0;
            font-size: 1rem;
        }
        .info_empresa p {
            margin: 0.1em;
        }
        .info_ticket {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: start;
        }
        .id_ticket {
            font-size: 12px;
            padding-bottom: 10px;
        }
        .info_cliente {
            padding: 10px 15px 0 15px;
            font-size: 13px;
            border-top: 1px dashed #999;
        }
        .line {
        border-top: 1px dashed #999;
        margin: 10px 0;
        }

        .items {
        padding: 0 15px;
        }

        .item {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 5px;
        }

        .total {
        padding: 0 15px;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        }

        .footer {
        text-align: center;
        font-size: 12px;
        padding: 10px;
        color: #555;
        }
    </style>
</head>
<body>
    <div class="POS">
        <div class="qr">
            <img id="qr-code" src="" alt="" width="100%">
        </div>
        <div class="header">
            <div class="logo">
                <img src="Logo/LOGOAPP.png" alt="logo">
            </div>
            <div class="info_empresa">
                <h2>GRIEGUS</h2>
                <p>Barrio El Centro, Av. La Holla, Santa Bárbara</p>
                <p>Tel: +504 8817-7532</p>
            </div>
        </div>
        <div class="info_ticket">
            <div id="f">12/12/12, 12:00 PM</div>
            <!-- Campo Id Ticket -->
            <div class="id_ticket"><strong>Ticket ID:</strong> <span id="ticket">a123bc9</span></div> 
        </div>
        <div class="info_cliente">
            <!-- Campo Cliente variable c -->
            <div><strong>Cliente:</strong> <span id="c"></span></div>
            <div><strong>Tel:</strong> <span id="tel"></span></div>
        </div>
        <!-- Detalle del ticket -->
        <div class="line"></div>

        <div class="items" id="items"></div>

        <div class="line"></div>
        
        <div class="total">
            <span>TOTAL</span>
            <!-- Campo Total variable t -->
            <span id="t"></span>
        </div>

        <div class="footer">
            Gracias por su compra
        </div>
    </div>

    <script>
  const params = new URLSearchParams(window.location.search);

  //Obtener parámetro o valor por defecto
  function getParam(name, fallback) {
    return params.get(name) || fallback;
  }

  //Datos ticket
  const fechaRaw = getParam("f", null); //variable f es fecha

    let fechaFormateada;

    if (fechaRaw) {
        const fechaObj = new Date(fechaRaw);
        fechaFormateada = fechaObj.toLocaleString();
    } else {
        fechaFormateada = new Date().toLocaleString();
    }
  const ticket = getParam("ticket", Math.floor(Math.random() * 10000));

//   Datos cliente

  const cliente = getParam("c", "Cliente Final");//variable c es cliente
  const tel = getParam("tel", "98587507");//variable tel es telefono

// detalle de ticket
  let detalleRaw = params.get("d");//variable d es detalle
  // Si no hay detalle → demo
  if (!detalleRaw) {
    detalleRaw = "Corte x1:100,Barba x2:100,Shampoo x1:70";
  }
   
  const itemsDiv = document.getElementById("items");

  let totalCalculado = 0;

  // 🔹 Procesar detalle
  detalleRaw.split(",").forEach(item => {
    if (!item) return;

    const partes = item.split(":");
    if (partes.length < 2) return;

    const nombreCantidad = partes[0];
    const precio = parseFloat(partes[1]) || 0;

    totalCalculado += precio;

    const div = document.createElement("div");
    div.classList.add("item");

    div.innerHTML = `
      <span>${nombreCantidad}</span>
      <span>L ${precio.toFixed(2)}</span>
    `;

    itemsDiv.appendChild(div);
  });
  //Mostrar datos
  document.getElementById("f").innerText = fechaFormateada;
  document.getElementById("ticket").innerText = ticket;
  document.getElementById("c").innerText = cliente;
  document.getElementById("tel").innerText = tel;
  //Total desde URL o calculado
  const totalParam = params.get("t"); //variable t es total
  const totalFinal = totalParam ? parseFloat(totalParam) : totalCalculado;

  document.getElementById("t").innerText = "L " + totalFinal.toFixed(2);
//  codigo qr

document.getElementById("qr-code").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=" + encodeURIComponent(ticket);
</script>
</body>
</html>
